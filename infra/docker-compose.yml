version: "3.11"

services:
  neo4j:
    image: neo4j:5.17
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./neo4j.conf:/var/lib/neo4j/conf/neo4j.conf
    environment:
      - NEO4J_AUTH=neo4j/test
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=test
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
  viewer:
    build:
      context: ..
      dockerfile: web/viewer/Dockerfile
    environment:
      - VITE_API_BASE=http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  neo4j_data:
